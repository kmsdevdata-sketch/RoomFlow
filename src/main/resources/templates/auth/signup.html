<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{/css/bootstrap.min.css}"
          href="../../static/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4A90E2;
        }
        body {
            background-color: #F8FAFC;
            font-family: 'Pretendard', sans-serif;
            min-height: 100vh;
            padding: 3rem 1rem;
        }
        .signup-card {
            max-width: 550px;
            margin: auto;
            background: white;
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.06);
        }
        .signup-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .signup-header h2 {
            font-weight: 800;
            color: #1E293B;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .section-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-color);
            margin: 2rem 0 1rem 0;
            border-bottom: 2px solid #F1F5F9;
            padding-bottom: 0.5rem;
        }
        .form-label {
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.4rem;
            font-size: 0.95rem;
        }
        .form-control {
            border-radius: 10px;
            padding: 0.7rem 1rem;
            border: 1px solid #E2E8F0;
            background-color: #FAFBFC;
            transition: all 0.2s;
        }
        .form-control:focus {
            background-color: white;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }
        .field-error {
            color: #EF4444;
            font-size: 0.8rem;
            margin-top: 0.25rem;
            font-weight: 500;
        }
        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            margin-top: 2rem;
            transition: all 0.2s;
        }
        .btn-submit:hover {
            background-color: #357ABD;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.2);
        }
        .btn-cancel {
            background-color: #F1F5F9;
            color: #64748B;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

<div class="container signup-card">
    <div class="signup-header">
        <h2>멤버 가입</h2>
        <p class="text-muted small">간단한 정보 입력으로 Roomflow와 함께하세요</p>
    </div>

    <form th:action th:object="${user}" method="post">
        <div th:if="${#fields.hasGlobalErrors()}">
            <p class="field-error" th:each="err : ${#fields.globalErrors()}" th:text="${err}">전체 오류 메시지</p>
        </div>

        <div class="section-title">계정 정보</div>
        <div class="mb-3">
            <label th:for="loginId" class="form-label">아이디</label>
            <input type="text" th:field="*{loginId}" class="form-control"
                   th:errorclass="is-invalid" placeholder="사용하실 아이디를 입력하세요">
            <div class="field-error" th:errors="*{loginId}">아이디 오류</div>
        </div>

        <div class="mb-3">
            <label th:for="password" class="form-label">비밀번호</label>
            <input type="password" th:field="*{password}" class="form-control"
                   th:errorclass="is-invalid" placeholder="비밀번호를 입력하세요">
            <div class="field-error" th:errors="*{password}">비밀번호 오류</div>
        </div>

        <div class="section-title">개인 정보</div>
        <div class="mb-3">
            <label th:for="name" class="form-label">이름</label>
            <input type="text" th:field="*{name}" class="form-control"
                   th:errorclass="is-invalid" placeholder="실명을 입력하세요">
            <div class="field-error" th:errors="*{name}">이름 오류</div>
        </div>

        <div class="mb-3">
            <label th:for="birthDate" class="form-label">생년월일</label>
            <input type="date" th:field="*{birthDate}" class="form-control"
                   th:errorclass="is-invalid">
            <div class="field-error" th:errors="*{birthDate}">날짜 오류</div>
        </div>

        <div class="mb-3">
            <label th:for="phoneNumber" class="form-label">휴대전화 번호</label>
            <input type="text" th:field="*{phoneNumber}" class="form-control"
                   th:errorclass="is-invalid" placeholder="010-0000-0000">
            <div class="field-error" th:errors="*{phoneNumber}">번호 오류</div>
        </div>

        <div class="mb-3">
            <label th:for="email" class="form-label">이메일</label>
            <input type="email" th:field="*{email}" class="form-control"
                   th:errorclass="is-invalid" placeholder="example@email.com">
            <div class="field-error" th:errors="*{email}">이메일 오류</div>
        </div>

        <div class="row g-2">
            <div class="col-8">
                <button class="w-100 btn btn-submit" type="submit">회원 가입 완료</button>
            </div>
            <div class="col-4">
                <button class="w-100 btn btn-cancel"
                        onclick="location.href='home.html'"
                        th:onclick="|location.href='@{/}'|"
                        type="button">취소</button>
            </div>
        </div>
    </form>
</div>

</body>
</html>
