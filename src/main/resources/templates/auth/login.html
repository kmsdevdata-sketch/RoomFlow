<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{/css/bootstrap.min.css}"
          href="../../static/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4A90E2;
        }
        body {
            background-color: #F8FAFC;
            font-family: 'Pretendard', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            max-width: 420px;
            margin: auto;
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h2 {
            font-weight: 800;
            color: #1E293B;
            font-size: 1.75rem;
        }
        .form-label {
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.5rem;
        }
        .form-control {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1px solid #E2E8F0;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }
        .field-error {
            color: #EF4444;
            font-size: 0.85rem;
            margin-top: 0.25rem;
            font-weight: 500;
        }
        .btn-login {
            background-color: var(--primary-color);
            border: none;
            color: white;
            padding: 0.8rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 1rem;
            transition: all 0.2s;
        }
        .btn-login:hover {
            background-color: #357ABD;
            transform: translateY(-1px);
        }
        .btn-cancel {
            background: #F1F5F9;
            color: #64748B;
            border: none;
            padding: 0.8rem;
            border-radius: 12px;
            font-weight: 600;
        }
        .global-error {
            background-color: #FEF2F2;
            color: #EF4444;
            padding: 0.75rem;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            border: 1px solid #FEE2E2;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container login-card">
    <div class="login-header">
        <h2>환영합니다!</h2>
        <p class="text-muted small">로그인하여 Roomflow를 이용해보세요</p>
    </div>

    <form action="" th:action th:object="${loginForm}" method="post">
        <div th:if="${#fields.hasGlobalErrors()}" class="global-error">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}">전체 오류 메시지</p>
        </div>

        <div class="mb-3">
            <label th:for="loginId" class="form-label">아이디</label>
            <input type="text" th:field="*{loginId}" class="form-control"
                   th:errorclass="is-invalid" placeholder="아이디를 입력하세요">
            <div class="field-error" th:errors="*{loginId}">아이디 오류</div>
        </div>

        <div class="mb-4">
            <label th:for="password" class="form-label">비밀번호</label>
            <input type="password" th:field="*{password}" class="form-control"
                   th:errorclass="is-invalid" placeholder="비밀번호를 입력하세요">
            <div class="field-error" th:errors="*{password}">비밀번호 오류</div>
        </div>

        <div class="row g-2">
            <div class="col">
                <button class="w-100 btn btn-login" type="submit">로그인</button>
            </div>
            <div class="col">
                <button class="w-100 btn btn-cancel"
                        onclick="location.href='home.html'"
                        th:onclick="|location.href='@{/}'|"
                        type="button">취소</button>
            </div>
        </div>
    </form>
</div>

</body>
</html>
