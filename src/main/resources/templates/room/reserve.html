<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{/css/bootstrap.min.css}"
          href="../../static/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4A90E2;
            --selected-bg: #EBF4FF;
            --active-bg: #4A90E2;
            --active-text: #ffffff;
            --booked-bg: #F1F5F9;
            --booked-text: #94A3B8;
        }
        body {
            background-color: #F8FAFC;
            font-family: 'Pretendard', sans-serif;
            padding: 3rem 1rem;
        }
        .reserve-container { max-width: 850px; margin: auto; }
        
        /* 룸 정보 요약 카드 */
        .room-summary {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        .room-icon-large {
            width: 70px; height: 70px;
            background: #EBF4FF; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem;
        }

        /* 날짜 선택 섹션 */
        .date-selection-card {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .custom-date-input {
            border: 2px solid #E2E8F0;
            border-radius: 16px;
            padding: 1rem 1.2rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: #1E293B;
            width: 100%;
            max-width: 320px;
            cursor: pointer;
            transition: all 0.2s;
            background: #FAFBFC;
        }
        .custom-date-input:focus {
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
            outline: none;
        }

        /* 시간 그리드 */
        .time-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
            margin: 1.5rem 0;
        }
        .time-block {
            padding: 18px 10px;
            border: 2px solid #F1F5F9;
            border-radius: 16px;
            background: white;
            text-align: center;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: #475569;
            position: relative;
        }
        .time-block:hover:not(.booked) {
            border-color: var(--primary-color);
            background: var(--selected-bg);
            transform: translateY(-2px);
        }
        .time-block.active {
            background-color: var(--active-bg) !important;
            border-color: var(--active-bg) !important;
            color: var(--active-text) !important;
        }
        /* 예약된 시간 스타일 (서버 데이터 기반) */
        .time-block.booked {
            background-color: var(--booked-bg);
            border-color: #E2E8F0;
            color: var(--booked-text);
            cursor: not-allowed;
        }
        .time-block.booked::after {
            content: '예약됨';
            display: block;
            font-size: 0.7rem;
            font-weight: 500;
            margin-top: 4px;
        }

        /* 하단 선택 요약 바 */
        .selection-summary {
            background: #1E293B;
            color: white;
            padding: 1.5rem 2.5rem;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .summary-info h5 { margin-bottom: 2px; font-weight: 800; }
        .summary-info span { opacity: 0.6; font-size: 0.85rem; }

        .btn-confirm {
            background: var(--primary-color);
            color: white; border: none;
            padding: 0.9rem 2.5rem;
            border-radius: 14px;
            font-weight: 800;
            transition: all 0.2s;
        }
        .btn-confirm:hover:not(:disabled) {
            background: #357ABD;
            transform: scale(1.03);
        }
        .btn-confirm:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .field-error { color: #EF4444; font-size: 0.85rem; font-weight: 600; margin-top: 0.5rem; }
    </style>
</head>
<body>

<div class="container reserve-container">
    <div class="room-summary">
        <div class="room-icon-large">🏢</div>
        <div class="room-info-text">
            <h3 th:text="${room.name}" class="mb-1 font-weight-bold">방 이름</h3>
            <p class="text-muted mb-0">
                <span class="badge bg-light text-dark mr-2">👥 최대 <th:block th:text="${room.capacity}"></th:block>명</span>
                <span class="badge bg-light text-dark">🕒 운영 <th:block th:text="|${room.openTime} - ${room.closeTime}|"></th:block></span>
            </p>
        </div>
    </div>

    <form th:action="@{/reservations}" th:object="${reservation}" method="post" id="reserveForm">
        <input type="hidden" th:field="*{roomId}">
        <input type="hidden" th:field="*{startTime}" id="hiddenStartTime">
        <input type="hidden" th:field="*{endTime}" id="hiddenEndTime">

        <div class="date-selection-card">
            <label class="h5 font-weight-bold mb-3 d-block">1. 이용 날짜 선택</label>
            <input type="date" 
                   th:value="${#temporals.format(reservation.date, 'yyyy-MM-dd')}"
                   name="date"
                   class="custom-date-input" id="datePicker" required>
            <div class="field-error" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
        </div>

        <div class="date-selection-card">
            <label class="h5 font-weight-bold mb-1 d-block">2. 이용 시간 선택</label>
            <p class="text-muted small mb-4">예약하실 시간의 시작 블록과 종료 블록을 차례대로 클릭하세요.</p>
            
            <div class="time-grid">
                <!-- reservationTimes 리스트에 포함된 시간은 booked 클래스 적용 -->
                <div th:each="hour : ${#numbers.sequence(room.openTime.hour, room.closeTime.hour - 1)}" 
                     class="time-block" 
                     th:classappend="${#lists.contains(reservationTimes, hour)} ? 'booked' : ''"
                     th:data-hour="${hour}"
                     th:data-booked="${#lists.contains(reservationTimes, hour)}">
                    <span th:text="|${#numbers.formatInteger(hour, 2)}:00|">09:00</span>
                </div>
            </div>

            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger py-2">
                <p class="mb-0 small text-center" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
            </div>
        </div>

        <div class="selection-summary">
            <div class="summary-info">
                <span>선택된 예약 시간</span>
                <h5 id="displayRange">시간을 선택해주세요</h5>
            </div>
            <div class="d-flex align-items-center gap-3">
                <button type="button" class="btn btn-link text-white text-decoration-none px-3" 
                        th:onclick="|location.href='@{/rooms}'|">취소</button>
                <button class="btn btn-confirm" type="submit" id="submitBtn" disabled>예약 신청하기</button>
            </div>
        </div>
    </form>
</div>

<script th:inline="javascript">
    const datePicker = document.getElementById('datePicker');
    const timeBlocks = document.querySelectorAll('.time-block');
    const hiddenStart = document.getElementById('hiddenStartTime');
    const hiddenEnd = document.getElementById('hiddenEndTime');
    const displayRange = document.getElementById('displayRange');
    const submitBtn = document.getElementById('submitBtn');

    // 날짜 변경 시 페이지 새로고침하여 해당 날짜의 예약 현황 로드
    datePicker.addEventListener('change', function() {
        const roomId = [[${room.id}]];
        location.href = `/rooms/${roomId}/reserve?date=${this.value}`;
    });

    let first = null;
    let second = null;

    timeBlocks.forEach(block => {
        block.addEventListener('click', () => {
            if (block.classList.contains('booked')) return;

            const hour = parseInt(block.dataset.hour);

            if (first === null || (first !== null && second !== null)) {
                first = hour;
                second = null;
            } else {
                if (hour === first) {
                    first = null;
                } else {
                    const start = Math.min(first, hour);
                    const end = Math.max(first, hour);
                    
                    // 중간에 이미 예약된 시간이 포함되어 있는지 검증
                    let hasBooked = false;
                    for (let i = start; i <= end; i++) {
                        const target = document.querySelector(`.time-block[data-hour="${i}"]`);
                        if (target && target.dataset.booked === 'true') {
                            hasBooked = true;
                            break;
                        }
                    }

                    if (hasBooked) {
                        alert("선택하신 범위 내에 이미 예약된 시간이 포함되어 있습니다.");
                        first = null;
                        second = null;
                    } else {
                        first = start;
                        second = end;
                    }
                }
            }
            updateUI();
        });
    });

    function updateUI() {
        timeBlocks.forEach(block => {
            const h = parseInt(block.dataset.hour);
            block.classList.remove('active');
            if (second !== null) {
                if (h >= first && h <= second) block.classList.add('active');
            } else if (first !== null) {
                if (h === first) block.classList.add('active');
            }
        });

        if (first !== null && second !== null) {
            const startStr = String(first).padStart(2, '0') + ':00';
            const endStr = String(second + 1).padStart(2, '0') + ':00';
            displayRange.innerText = `${startStr} ~ ${endStr}`;
            hiddenStart.value = startStr + ':00';
            hiddenEnd.value = endStr + ':00';
            submitBtn.disabled = false;
        } else if (first !== null) {
            displayRange.innerText = String(first).padStart(2, '0') + ':00 ~ 선택중';
            submitBtn.disabled = true;
        } else {
            displayRange.innerText = '시간을 선택해주세요';
            hiddenStart.value = '';
            hiddenEnd.value = '';
            submitBtn.disabled = true;
        }
    }
</script>

</body>
</html>
