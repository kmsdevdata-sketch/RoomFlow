<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{/css/bootstrap.min.css}"
          href="../../static/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4A90E2;
            --selected-bg: #EBF4FF;
            --active-bg: #4A90E2;
            --active-text: #ffffff;
        }
        body {
            background-color: #F8FAFC;
            font-family: 'Pretendard', sans-serif;
            padding: 3rem 1rem;
        }
        .reserve-container {
            max-width: 800px;
            margin: auto;
        }
        .room-summary {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        .room-icon-large {
            width: 80px;
            height: 80px;
            background: #EBF4FF;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        .room-info-text h3 {
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: #1E293B;
        }
        .form-card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        /* 시간 블록 스타일 */
        .time-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-bottom: 2rem;
        }
        .time-block {
            padding: 15px 10px;
            border: 2px solid #F1F5F9;
            border-radius: 12px;
            background: white;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #64748B;
            user-select: none;
        }
        .time-block:hover {
            border-color: var(--primary-color);
            background: var(--selected-bg);
        }
        .time-block.active {
            background-color: var(--active-bg);
            border-color: var(--active-bg);
            color: var(--active-text);
        }
        .time-block.disabled {
            background-color: #F8FAFC;
            color: #CBD5E1;
            cursor: not-allowed;
            border-color: #F1F5F9;
        }

        .selection-summary {
            background: #F8FAFC;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border-left: 5px solid var(--primary-color);
        }
        .selection-summary p {
            margin-bottom: 0;
            font-weight: 700;
            color: #1E293B;
            font-size: 1.1rem;
        }

        .field-error {
            color: #EF4444;
            font-size: 0.85rem;
            margin-top: 0.25rem;
            font-weight: 600;
        }
        .btn-confirm {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-confirm:hover {
            background: #357ABD;
            transform: translateY(-2px);
        }
        .btn-back {
            background: #F1F5F9;
            color: #64748B;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container reserve-container">
    <div class="room-summary">
        <div class="room-icon-large">🏢</div>
        <div class="room-info-text">
            <h3 th:text="${room.name}">방 이름</h3>
            <p class="text-muted mb-0">
                👥 정원: <span th:text="${room.capacity}">4</span>명 |
                🕒 운영: <span th:text="|${room.openTime} - ${room.closeTime}|">09:00 - 22:00</span>
            </p>
        </div>
    </div>

    <div class="form-card">
        <h4 class="mb-4 font-weight-bold">시간 선택</h4>
        
        <form th:action="@{/reservations}" th:object="${reservation}" method="post" id="reserveForm">
            <input type="hidden" name="roomId" th:value="${room.id}">
            <!-- Hidden inputs for validation binding -->
            <input type="hidden" th:field="*{startTime}" id="hiddenStartTime">
            <input type="hidden" th:field="*{endTime}" id="hiddenEndTime">

            <div class="mb-4">
                <label th:for="date" class="form-label font-weight-bold">1. 날짜 선택</label>
                <input type="date" th:field="*{date}" class="form-control" 
                       th:errorclass="is-invalid" required>
                <div class="field-error" th:if="${#fields.hasErrors('date')}" th:errors="*{date}">날짜 오류</div>
            </div>

            <label class="form-label font-weight-bold">2. 시간 블록 선택 (시작과 끝 블록을 클릭하세요)</label>
            <div class="time-grid" id="timeGrid">
                <!-- 운영 시간에 맞춰 블록 생성 -->
                <div th:each="hour : ${#numbers.sequence(room.openTime.hour, room.closeTime.hour - 1)}" 
                     class="time-block" 
                     th:data-hour="${hour}"
                     th:text="|${#numbers.formatInteger(hour, 2)}:00|">
                    09:00
                </div>
            </div>

            <div class="selection-summary">
                <p>Selected Time: 
                    <span id="displayStartTime">--:--</span> 
                    ~ 
                    <span id="displayEndTime">--:--</span>
                </p>
                <div class="field-error" th:if="${#fields.hasErrors('startTime')}" th:errors="*{startTime}">시작시간 오류</div>
                <div class="field-error" th:if="${#fields.hasErrors('endTime')}" th:errors="*{endTime}">종료시간 오류</div>
            </div>

            <div th:if="${#fields.hasGlobalErrors()}" class="global-error mb-4">
                <p class="field-error text-center" th:each="err : ${#fields.globalErrors()}" th:text="${err}">전체 오류</p>
            </div>

            <div class="row g-3">
                <div class="col-md-8">
                    <button class="btn btn-confirm" type="submit" id="submitBtn" disabled>예약 신청하기</button>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-back" type="button"
                            th:onclick="|location.href='@{/rooms}'|">취소</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    const timeBlocks = document.querySelectorAll('.time-block');
    const hiddenStart = document.getElementById('hiddenStartTime');
    const hiddenEnd = document.getElementById('hiddenEndTime');
    const displayStart = document.getElementById('displayStartTime');
    const displayEnd = document.getElementById('displayEndTime');
    const submitBtn = document.getElementById('submitBtn');

    let firstSelected = null;
    let secondSelected = null;

    timeBlocks.forEach(block => {
        block.addEventListener('click', () => {
            const hour = parseInt(block.dataset.hour);

            if (firstSelected === null || (firstSelected !== null && secondSelected !== null)) {
                // 초기 선택 또는 이미 범위가 완성된 상태에서 다시 클릭 시 리셋
                firstSelected = hour;
                secondSelected = null;
            } else {
                // 두 번째 선택
                if (hour === firstSelected) {
                    // 같은 거 클릭 시 초기화
                    firstSelected = null;
                    secondSelected = null;
                } else {
                    if (hour < firstSelected) {
                        secondSelected = firstSelected;
                        firstSelected = hour;
                    } else {
                        secondSelected = hour;
                    }
                }
            }
            updateUI();
        });
    });

    function updateUI() {
        timeBlocks.forEach(block => {
            const h = parseInt(block.dataset.hour);
            block.classList.remove('active');
            
            if (secondSelected !== null) {
                if (h >= firstSelected && h <= secondSelected) {
                    block.classList.add('active');
                }
            } else if (firstSelected !== null) {
                if (h === firstSelected) {
                    block.classList.add('active');
                }
            }
        });

        if (firstSelected !== null) {
            const startTimeStr = String(firstSelected).padStart(2, '0') + ':00';
            displayStart.innerText = startTimeStr;
            hiddenStart.value = startTimeStr + ':00'; // LocalTime format (HH:mm:ss)
            
            if (secondSelected !== null) {
                const endTimeStr = String(secondSelected + 1).padStart(2, '0') + ':00';
                displayEnd.innerText = endTimeStr;
                hiddenEnd.value = endTimeStr + ':00';
                submitBtn.disabled = false;
            } else {
                displayEnd.innerText = '--:--';
                hiddenEnd.value = '';
                submitBtn.disabled = true;
            }
        } else {
            displayStart.innerText = '--:--';
            displayEnd.innerText = '--:--';
            hiddenStart.value = '';
            hiddenEnd.value = '';
            submitBtn.disabled = true;
        }
    }
</script>

</body>
</html>
