<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{/css/bootstrap.min.css}"
          href="../../static/css/bootstrap.min.css" rel="stylesheet">
    <title>404 Not Found</title>
    <style>
        :root {
            --bg-color: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-main: #1E293B;
            --text-sub: #64748B;
            --border-color: #E2E8F0;
            --primary-color: #4A90E2;
            --accent-color: #F97316;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            background:
                    radial-gradient(circle at top left, rgba(74, 144, 226, 0.10), transparent 28%),
                    radial-gradient(circle at bottom right, rgba(249, 115, 22, 0.10), transparent 24%),
                    var(--bg-color);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            color: var(--text-main);
        }
        .error-card {
            width: 100%;
            max-width: 640px;
            background: var(--card-bg);
            border: 1px solid rgba(226, 232, 240, 0.9);
            border-radius: 28px;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }
        .error-header {
            padding: 2rem 2.25rem 1.5rem;
            background: linear-gradient(135deg, #FFF7ED, #FFFFFF 60%);
        }
        .error-code {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 84px;
            height: 40px;
            padding: 0 1rem;
            border-radius: 999px;
            background: rgba(249, 115, 22, 0.12);
            color: var(--accent-color);
            font-weight: 800;
            letter-spacing: 0.04em;
        }
        .error-header h1 {
            margin: 1rem 0 0.5rem;
            font-size: 2rem;
            font-weight: 800;
        }
        .error-header p {
            margin: 0;
            color: var(--text-sub);
            line-height: 1.6;
        }
        .error-body {
            padding: 2rem 2.25rem 2.25rem;
        }
        .info-box {
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 1rem 1.1rem;
            background: #F8FAFC;
            margin-bottom: 1.5rem;
        }
        .info-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: #94A3B8;
            margin-bottom: 0.35rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .info-value {
            font-weight: 700;
            color: var(--text-main);
            word-break: break-word;
        }
        .helper-text {
            color: var(--text-sub);
            margin-bottom: 1.75rem;
            line-height: 1.7;
        }
        .button-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .btn-primary-soft {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0.85rem 1.3rem;
            font-weight: 700;
        }
        .btn-primary-soft:hover {
            background: #357ABD;
            color: white;
        }
        .btn-light-soft {
            background: #F1F5F9;
            color: #475569;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 0.85rem 1.3rem;
            font-weight: 700;
        }
        .btn-light-soft:hover {
            background: #E2E8F0;
            color: #334155;
        }
        @media (max-width: 576px) {
            .error-header,
            .error-body {
                padding-left: 1.4rem;
                padding-right: 1.4rem;
            }
            .button-group {
                display: grid;
            }
        }
    </style>
</head>
<body>

<div class="error-card">
    <div class="error-header">
        <span class="error-code">ERROR 4xx</span>
        <h1>요청하신 페이지를 찾을 수 없습니다.</h1>
        <p>
            주소가 잘못 입력되었거나, 더 이상 제공되지 않는 경로일 수 있습니다.
            입력한 URL을 다시 확인해 주세요.
        </p>
    </div>

    <div class="error-body">
        <div class="info-box">
            <span class="info-label">요청 경로</span>
            <span class="info-value" th:text="${request != null ? request.getAttribute('jakarta.servlet.error.request_uri') : ''}">
                /error-404
            </span>
        </div>

        <p class="helper-text">
            홈으로 돌아가 다시 이동하시거나, 직전 페이지로 돌아가서 경로를 다시 확인해 보세요.
        </p>

        <div class="button-group">
            <button type="button" class="btn btn-primary-soft" th:onclick="|location.href='@{/}'|">
                홈으로 이동
            </button>
            <button type="button" class="btn btn-light-soft" onclick="history.back()">
                이전 페이지
            </button>
        </div>
    </div>
</div>

</body>
</html>
